name: Build and Release BulkPDF

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Get version from XML
        id: get_version
        shell: powershell
        run: |
          [xml]$project = Get-Content "project_info.xml"
          $version = $project.project.version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --onedir --windowed `
            --name "BulkPDF" `
            --icon="src/assets/logo.ico" `
            --add-data="src/assets;assets" `
            --add-data="project_info.xml;." `
            --paths="src" `
            --collect-all "customtkinter" `
            src/main.py

      - name: Build Windows Installer (Inno Setup)
        shell: pwsh
        run: |
          $ver = "${{ steps.get_version.outputs.VERSION }}"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$ver "installer_script.iss"

      - name: Generate SHA256 Hashes
        shell: pwsh
        run: |
          if (Test-Path "Output") {
            Get-ChildItem -Path Output/*.exe | Get-FileHash -Algorithm SHA256 | Out-File -FilePath Output/SHA256SUMS.txt
          }

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: BulkPDF v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Installation
            1. Téléchargez `BulkPDF_Setup.exe`.
            2. Si Windows affiche une alerte SmartScreen :
               - Cliquez sur **"Informations complémentaires"**.
               - Cliquez sur **"Exécuter quand même"**.
          files: |
            Output/*.exe
            Output/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
