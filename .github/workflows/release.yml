name: Build and Release BulkFolder

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  # ÉTAPE 1 : Analyse de la qualité du code
  sonar-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.BULK_FOLDER_SCAN }}
        with:
          args: >
            -Dsonar.cpd.exclusions=src/bulkfolder/ui/views/**,src/bulkfolder/ui/**
            -Dsonar.coverage.exclusions=**/*

  # ÉTAPE 2 : Build de l'exécutable et de l'installeur
  build:
    needs: sonar-scan
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller customtkinter pillow matplotlib

      - name: Get version from XML
        id: get_version
        shell: powershell
        run: |
          # Lit la version directement dans votre project_info.xml
          [xml]$project = Get-Content "project_info.xml"
          $version = $project.project.version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Version détectée : $version"

      - name: Build EXE with PyInstaller
        run: |
          # Création du script de lancement dynamique
          echo "import sys, os; sys.path.insert(0, os.path.join(os.path.dirname(__file__), 'src')); from bulkfolder.ui.main import main; main()" > run.py
          
          # Compilation PyInstaller
          # --uac-admin aide à éviter les blocages SmartScreen en déclarant les droits admin
          python -m PyInstaller --noconfirm --windowed `
            --name "BulkFolder" `
            --icon="src/assets/logo.ico" `
            --add-data="src/assets;assets" `
            --add-data="project_info.xml;." `
            --paths="src" `
            --version-file="version_info.txt" `
            --collect-all "customtkinter" `
            --uac-admin `
            run.py

      - name: Build Installer with Inno Setup
        shell: pwsh
        run: |
          # Utilise le compilateur Inno Setup pré-installé sur l'image GitHub Windows
          $ver = "${{ steps.get_version.outputs.VERSION }}"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$ver "installer_script.iss"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: BulkFolder v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Nouveautés de la version ${{ steps.get_version.outputs.VERSION }}
            - Build automatique via GitHub Actions.
            - Installeur Windows inclus pour éviter les alertes de sécurité.
          # Télécharge l'installeur généré dans le dossier Output par Inno Setup
          files: Output/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}