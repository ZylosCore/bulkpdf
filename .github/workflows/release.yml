name: Build and Release BulkPDF

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Get version from XML
        id: get_version
        shell: powershell
        run: |
          [xml]$project = Get-Content "project_info.xml"
          $version = $project.project.version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --onedir --windowed `
            --name "BulkPDF" `
            --icon="src/assets/logo.ico" `
            --add-data="src/assets;assets" `
            --add-data="project_info.xml;." `
            --paths="src" `
            --collect-all "customtkinter" `
            src/main.py

      # DECODAGE DU CERTIFICAT
      - name: Import Certificate
        shell: pwsh
        run: |
          if ("${{ secrets.CERT_BASE64 }}" -eq "") { Write-Error "Secret CERT_BASE64 est vide !"; exit 1 }
          $certBytes = [System.Convert]::FromBase64String("${{ secrets.CERT_BASE64 }}")
          [System.IO.File]::WriteAllBytes("${{ github.workspace }}\cert.pfx", $certBytes)

      # SIGNATURE DE L'EXE
      - name: Sign PyInstaller EXE
        shell: pwsh
        env:
          CERT_PASS: ${{ secrets.CERT_PASSWORD }}
        run: |
          $signtool = (Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" | Select-Object -First 1).FullName
          & $signtool sign /f "${{ github.workspace }}\cert.pfx" /p "$env:CERT_PASS" /tr http://timestamp.digicert.com /td sha256 /fd sha256 "dist\BulkPDF\BulkPDF.exe"

      # CONSTRUCTION ET SIGNATURE DE L'INSTALLATEUR
      - name: Build Windows Installer (Inno Setup)
        shell: pwsh
        env:
          CERT_PASS: ${{ secrets.CERT_PASSWORD }}
        run: |
          $signtool = (Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" | Select-Object -First 1).FullName
          $ver = "${{ steps.get_version.outputs.VERSION }}"
          # On utilise des variables d'environnement pour éviter les problèmes de caractères spéciaux dans le mot de passe
          $signtool_cmd = "`"$signtool`" sign /f `"${{ github.workspace }}\cert.pfx`" /p `"$env:CERT_PASS`" /tr http://timestamp.digicert.com /td sha256 /fd sha256 `$f"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$ver "/SMsSign=$signtool_cmd" "installer_script.iss"

      - name: Generate SHA256 Hashes
        shell: pwsh
        run: |
          if (Test-Path "Output") {
            Get-ChildItem -Path Output/*.exe | Get-FileHash -Algorithm SHA256 | Out-File -FilePath Output/SHA256SUMS.txt
          }

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: BulkPDF v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Sécurité
            L'application est signée numériquement. Comparez le hash SHA256 dans `SHA256SUMS.txt`.
          files: |
            Output/*.exe
            Output/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
