name: Build and Release BulkFolder

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller customtkinter pillow matplotlib

      - name: Get version
        id: get_version
        shell: powershell
        run: |
          [xml]$project = Get-Content "project_info.xml"
          echo "VERSION=$($project.project.version)" >> $env:GITHUB_OUTPUT

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: |
          # On crée un lanceur qui force le chemin vers 'src'
          $launcher = @"
          import sys, os
          sys.path.append(os.path.join(os.getcwd(), 'src'))
          from bulkfolder.ui.main import main
          if __name__ == '__main__':
              main()
          "@
          $launcher | Out-File -FilePath "run.py" -Encoding utf8

          # Compilation en UN SEUL FICHIER (--onefile) pour éviter l'erreur 4551
          python -m PyInstaller --noconfirm --onefile --windowed `
            --name "BulkFolder" `
            --icon="src/assets/logo.ico" `
            --add-data="src/assets;assets" `
            --add-data="project_info.xml;." `
            --paths="src" `
            --collect-all "customtkinter" `
            run.py

      - name: Build Windows Installer (Inno Setup)
        shell: pwsh
        run: |
          $ver = "${{ steps.get_version.outputs.VERSION }}"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$ver "installer_script.iss"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          files: Output/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}