name: Build and Release BulkPDF

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Get version from XML
        id: get_version
        shell: powershell
        run: |
          [xml]$project = Get-Content "project_info.xml"
          $version = $project.project.version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --onedir --windowed `
            --name "BulkPDF" `
            --icon="src/assets/logo.ico" `
            --add-data="src/assets;assets" `
            --add-data="project_info.xml;." `
            --paths="src" `
            --collect-all "customtkinter" `
            src/main.py

      # --- NOUVELLE ÉTAPE : IMPORT DU CERTIFICAT ---
      - name: Import Certificate
        shell: pwsh
        run: |
          $certBytes = [System.Convert]::FromBase64String("${{ secrets.CERT_BASE64 }}")
          [System.IO.File]::WriteAllBytes("${{ github.workspace }}\cert.pfx", $certBytes)

      # --- NOUVELLE ÉTAPE : SIGNATURE DE L'EXE PYINSTALLER ---
      - name: Sign PyInstaller EXE
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe" sign /f "${{ github.workspace }}\cert.pfx" /p "${{ secrets.CERT_PASSWORD }}" /tr http://timestamp.digicert.com /td sha256 /fd sha256 "dist\BulkPDF\BulkPDF.exe"

      # --- MODIFICATION : ISCC AVEC PARAMÈTRE DE SIGNATURE ---
      - name: Build Windows Installer (Inno Setup)
        shell: pwsh
        run: |
          $ver = "${{ steps.get_version.outputs.VERSION }}"
          $signtool_cmd = 'C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe sign /f "${{ github.workspace }}\cert.pfx" /p "${{ secrets.CERT_PASSWORD }}" /tr http://timestamp.digicert.com /td sha256 /fd sha256 $f'
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$ver "/SMsSign=$signtool_cmd" "installer_script.iss"

      - name: Generate SHA256 Hashes
        shell: pwsh
        run: |
          if (Test-Path "Output") {
            Get-ChildItem -Path Output/*.exe | Get-FileHash -Algorithm SHA256 | Out-File -FilePath Output/SHA256SUMS.txt
          }

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: BulkPDF v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Vérification de sécurité
            Ce fichier est signé numériquement par Zyloscore.
            Comparez le hash SHA256 dans `SHA256SUMS.txt` pour plus de sécurité.
          files: |
            Output/*.exe
            Output/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
